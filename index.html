<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniMap: Universal Map Comparison</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=4">
    
    <!-- OpenStreetMap via Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Mapbox GL JS -->
    <script src='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css' rel='stylesheet' />
    
    <!-- Apple MapKit JS -->
    <script src="https://cdn.apple-mapkit.com/mk/5.x.x/mapkit.js"></script>

    <!-- Azure Maps requires CSS loaded early -->
    <link href="https://atlas.microsoft.com/sdk/javascript/mapcontrol/3/atlas.min.css" rel="stylesheet" />
    
    <!-- We load Google, Azure, Yandex dynamically in app.js using keys from config.js -->
</head>
<body>
    <header class="app-header">
        <div class="logo">🌍 OmniMap</div>
        <div class="controls">
            <div class="search-box">
                <input type="text" id="global-search" placeholder="Search places (e.g., Levi's Stadium)..." />
                <button id="search-btn">Search</button>
            </div>
            <div class="type-dropdown">
                <select id="map-type-select">
                    <option value="street">Map View</option>
                    <option value="hybrid" selected>Hybrid View</option>
                    <option value="satellite">Satellite View</option>
                </select>
            </div>
            <button id="layout-toggle-btn" class="layout-btn" title="Toggle Grid Layout">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
            </button>
            <button id="open-tabs-btn" class="layout-btn" title="Open Each Map in New Tab">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                    <polyline points="15 3 21 3 21 9"></polyline>
                    <line x1="10" y1="14" x2="21" y2="3"></line>
                </svg>
            </button>
        </div>
    </header>

    <main class="map-grid">
        <div class="map-wrapper">
            <div class="map-label">Google Maps</div>
            <div id="map-google" class="map-container"></div>
        </div>
        <div class="map-wrapper">
            <div class="map-label">Apple Maps</div>
            <div id="map-apple" class="map-container"></div>
        </div>
        <div class="map-wrapper">
            <div class="map-label">Mapbox</div>
            <div id="map-mapbox" class="map-container"></div>
        </div>
        <div class="map-wrapper">
            <div class="map-label">Azure Maps</div>
            <div id="map-azure" class="map-container"></div>
        </div>
        <div class="map-wrapper">
            <div class="map-label">Yandex Maps</div>
            <div id="map-yandex" class="map-container"></div>
        </div>
        <div class="map-wrapper">
            <div class="map-label">OpenStreetMap</div>
            <div id="map-osm" class="map-container"></div>
        </div>
    </main>

    <!-- App Logic -->
    <script type="module" src="app.js?v=4"></script>
</body>
</html>
